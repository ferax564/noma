name: Release

# Publishes @ferax564/noma-cli, @ferax564/noma-mcp-server, @ferax564/noma-lsp,
# and @ferax564/noma-agent-sdk to npm with provenance, and cuts the GitHub
# release from the CHANGELOG slice.
#
# Two entry points:
#   - push a v* tag (the local-tag-then-push flow from CLAUDE.md), or
#   - run the workflow manually with a `tag` input — CI then creates the tag
#     on the current default-branch HEAD itself (useful when the operator
#     cannot push tags directly).
#
# npm publishing: versions already on the registry are skipped, so the
# local-publish flow (npm login + npm publish before pushing the tag) keeps
# this job green. The job FAILS only when a version still needs publishing
# and no NPM_TOKEN secret is configured — a release can never silently skip
# publishing, but local publishing remains a first-class path.

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      tag:
        description: Tag to create and release (e.g. v0.17.0); must match package.json
        required: true
        type: string

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve release tag
        id: tag
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            tag="$INPUT_TAG"
          else
            tag="$GITHUB_REF_NAME"
          fi
          case "$tag" in
            v[0-9]*.[0-9]*.[0-9]*) ;;
            *) echo "tag '$tag' is not a vX.Y.Z version tag" >&2; exit 1 ;;
          esac
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Resolve release source
        id: source
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -euo pipefail
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ] && git ls-remote --exit-code origin "refs/tags/$TAG" >/dev/null 2>&1; then
            git fetch --depth=1 origin "refs/tags/$TAG"
            git checkout --detach FETCH_HEAD
            echo "tag_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "tag_exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify tag matches package.json
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -euo pipefail
          pkg=$(node -p "require('./package.json').version")
          if [ "${TAG#v}" != "$pkg" ]; then
            echo "tag $TAG does not match package.json $pkg" >&2
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          registry-url: https://registry.npmjs.org

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: npm ci

      - name: Install Python SDK test dependencies
        run: python -m pip install -e 'packages/agent-sdk-py[test]'

      - name: Cache Puppeteer Chrome
        uses: actions/cache@v4
        with:
          path: ~/.cache/puppeteer
          key: puppeteer-chrome-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Chrome for release artifacts
        run: npx puppeteer browsers install chrome

      - name: Run complete release gate
        run: npm run test:full

      - name: Create tag after gates (manual dispatch only)
        if: ${{ github.event_name == 'workflow_dispatch' && steps.source.outputs.tag_exists != 'true' }}
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push origin "refs/tags/$TAG"

      - name: Publish packages to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          unpublished=()
          for dir in . packages/mcp-server packages/lsp-server packages/agent-sdk; do
            name=$(node -p "require('./$dir/package.json').name")
            version=$(node -p "require('./$dir/package.json').version")
            if [ "$(npm view "$name@$version" version 2>/dev/null || true)" = "$version" ]; then
              echo "$name@$version already on npm — skipping"
            else
              unpublished+=("$dir")
            fi
          done
          if [ "${#unpublished[@]}" -eq 0 ]; then
            echo "all package versions already on npm — nothing to publish"
            exit 0
          fi
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "::error::${#unpublished[@]} package version(s) need publishing but no NPM_TOKEN secret is configured. Either publish locally (npm login, then npm publish per package) and re-run, or add a secret with: gh secret set NPM_TOKEN" >&2
            exit 1
          fi
          for dir in "${unpublished[@]}"; do
            name=$(node -p "require('./$dir/package.json').name")
            if [ "$dir" = "." ]; then
              npm publish --provenance --access public
            else
              npm publish --provenance --access public -w "$name"
            fi
          done

      - name: Create GitHub release from CHANGELOG slice
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -euo pipefail
          version="${TAG#v}"
          awk -v ver="$version" '
            $0 ~ "^## \\[" ver "\\]" { found=1; next }
            /^## \[/ { if (found) exit }
            found { print }
          ' CHANGELOG.md > /tmp/notes.md
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "release $TAG already exists — skipping"
          else
            gh release create "$TAG" --title "$TAG" --notes-file /tmp/notes.md
          fi
