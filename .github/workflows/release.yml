name: Release

# Publishes @ferax564/noma-cli, @ferax564/noma-mcp-server, @ferax564/noma-lsp,
# and @ferax564/noma-agent-sdk to npm with provenance, and cuts the GitHub
# release from the CHANGELOG slice.
#
# Two entry points:
#   - push a v* tag (the local-tag-then-push flow from CLAUDE.md), or
#   - run the workflow manually with a `tag` input — CI then creates the tag
#     on the current default-branch HEAD itself (useful when the operator
#     cannot push tags directly).
#
# npm publishing requires an NPM_TOKEN repository secret; the job FAILS when
# it is absent so a release can never silently skip publishing. Versions
# already on the registry are skipped, so re-running a release is safe.

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      tag:
        description: Tag to create and release (e.g. v0.14.0); must match package.json
        required: true
        type: string

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Resolve release tag
        id: tag
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            tag="$INPUT_TAG"
          else
            tag="$GITHUB_REF_NAME"
          fi
          case "$tag" in
            v[0-9]*.[0-9]*.[0-9]*) ;;
            *) echo "tag '$tag' is not a vX.Y.Z version tag" >&2; exit 1 ;;
          esac
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Verify tag matches package.json
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -euo pipefail
          pkg=$(node -p "require('./package.json').version")
          if [ "${TAG#v}" != "$pkg" ]; then
            echo "tag $TAG does not match package.json $pkg" >&2
            exit 1
          fi

      - name: Create tag (manual dispatch only)
        if: ${{ github.event_name == 'workflow_dispatch' }}
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -euo pipefail
          if git ls-remote --exit-code origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "tag $TAG already exists on origin — releasing it as-is"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag "$TAG"
            git push origin "refs/tags/$TAG"
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          registry-url: https://registry.npmjs.org

      - run: npm ci

      - name: Verify versioned locations
        run: npm run release -- check

      - run: npx tsc --noEmit
      - run: npm test
      - run: npm run verify:conformance
      - run: npm run smoke:package

      - name: Publish packages to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "::error::NPM_TOKEN secret not configured — refusing to release without publishing. Add it with: gh secret set NPM_TOKEN" >&2
            exit 1
          fi
          for dir in . packages/mcp-server packages/lsp-server packages/agent-sdk; do
            name=$(node -p "require('./$dir/package.json').name")
            version=$(node -p "require('./$dir/package.json').version")
            if [ "$(npm view "$name@$version" version 2>/dev/null || true)" = "$version" ]; then
              echo "$name@$version already on npm — skipping"
              continue
            fi
            if [ "$dir" = "." ]; then
              npm publish --provenance --access public
            else
              npm publish --provenance --access public -w "$name"
            fi
          done

      - name: Create GitHub release from CHANGELOG slice
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -euo pipefail
          version="${TAG#v}"
          awk -v ver="$version" '
            $0 ~ "^## \\[" ver "\\]" { found=1; next }
            /^## \[/ { if (found) exit }
            found { print }
          ' CHANGELOG.md > /tmp/notes.md
          gh release create "$TAG" --title "$TAG" --notes-file /tmp/notes.md || \
            echo "release already exists — skipping"
