name: Deploy Noma site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Cache Puppeteer Chrome
        uses: actions/cache@v4
        with:
          path: ~/.cache/puppeteer
          key: puppeteer-chrome-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Chrome for Puppeteer
        run: npx puppeteer browsers install chrome

      - run: npx tsc --noEmit
      - run: npm test

      - name: Check project-memory drift
        run: npm run check:memory

      - name: Check versioned locations
        run: npm run release -- check

      - name: Smoke test packed CLI
        run: npm run smoke:package

      - name: Run conformance suite
        run: npm run verify:conformance

      - name: Build agent-sdk types
        run: npm run build:agent-sdk

      - name: Run agent-sdk tests
        run: npm run test:agent-sdk

      - name: Build site (render HTML, copy landing, generate PDFs)
        run: |
          mkdir -p dist/examples dist/docs
          npm run build:site

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
